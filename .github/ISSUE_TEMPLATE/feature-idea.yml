name: Feature Idea
description: Propose a new kernel feature idea
labels: ["wishlist"]
body:
  - type: input
    id: title
    attributes:
      label: Feature title
      description: A short, descriptive title for the feature.
      placeholder: "e.g., Support detached mounts with pivot_root()"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature and how it would work.
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use-Case
      description: Why is this feature valuable? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which subsystem area does this relate to?
      multiple: true
      options:
        - mounts
        - pidfd
        - namespaces
        - filesystems
        - sockets
        - cgroups
        - block-devices
        - security
        - io-uring
        - processes
        - other

  - type: textarea
    id: links
    attributes:
      label: Related links
      description: Links to mailing list threads, patches, documentation, etc.
